services:
  postgres:
    image: postgres:18.0
    environment:
    - POSTGRES_DB=cheffy
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    networks:
      - cheffy-network

    env_file:
      - .env

  cheffy-app:
    # Constrói a imagem a partir do Dockerfile no diretório atual
    build:
      context: .
      args:
        # Passa o valor para o Dockerfile. O nome do host é 'postgres' (o nome do serviço)
        DB_HOST_ARG: $DB_HOST
        POSTGRES_PASSWORD_ARG: $POSTGRES_PASSWORD
        DB_PORT_ARG: $DB_PORT
    ports:
      - "8080:8080"
    networks:
      - cheffy-network
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      DB_PORT: "${DB_PORT}"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      # KRAFT CONFIG
      # It's needed if we want to use kafka without depend on Zookeeper
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker, controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

      # NETWORK LISTENERS
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

      #Cluster Setup
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    networks:
      - cheffy-network

# Define as redes customizadas para os serviços
networks:
  cheffy-network:
    driver: bridge